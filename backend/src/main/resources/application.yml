spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/loandb}
    username: ${DATABASE_USER:loanapp}
    password: ${DATABASE_PASSWORD:loanpass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 900
  refresh-token-expiry: 604800

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.loanapp: DEBUG
    org.springframework.security: INFO

